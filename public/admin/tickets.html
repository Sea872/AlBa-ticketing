<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin — Ticket search</title>
    <link rel="stylesheet" href="/admin/styles.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/izitoast@1.4.0/dist/css/iziToast.min.css" />
  </head>
  <body>
    <header class="admin-top">
      <a href="/admin/dashboard.html" class="brand">AlbaGB &nbsp;<span>Ticketing</span></a>
      <nav>
        <a href="/admin/concerts.html">🎵 Concerts</a>
        <a href="/admin/tickets.html">🎫 Tickets</a>
        <a href="#" id="logout">Sign out</a>
      </nav>
    </header>
    <main class="admin-wide">
      <div class="card" style="padding-bottom:1rem">
        <h2 style="margin-bottom:0.5rem">Tickets</h2>
        <p class="muted" style="margin:0 0 1rem;font-size:0.875rem">All issued tickets. Filter by customer email or Shopify order ID.</p>
        <form id="search-form" style="display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center">
          <input id="q" name="q" type="text" autocomplete="off" placeholder="Search email or order ID…"
            style="flex:1;min-width:14rem;max-width:none;padding:0.5rem 0.75rem" />
          <select id="mode" name="mode" style="max-width:11rem;padding:0.5rem 0.65rem">
            <option value="email">Customer email</option>
            <option value="order">Order ID</option>
          </select>
          <button type="submit" style="white-space:nowrap">Search</button>
          <button type="button" id="btn-clear" class="secondary" style="white-space:nowrap">Show all</button>
        </form>
        <p id="form-err" class="msg-error" hidden></p>
      </div>

      <div class="card" id="results-card" hidden>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">
          <h2 style="margin:0" id="results-title">All tickets</h2>
          <span id="results-count" class="muted" style="font-size:0.8rem"></span>
        </div>
        <table class="data">
          <thead>
            <tr>
              <th>Concert</th>
              <th>Customer</th>
              <th>Order ID</th>
              <th style="text-align:center">#</th>
              <th>Status</th>
              <th>Email sent</th>
              <th style="min-width:10rem"></th>
            </tr>
          </thead>
          <tbody id="results-body"></tbody>
        </table>
        <p id="results-empty" class="empty" hidden>No tickets found.</p>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/izitoast@1.4.0/dist/js/iziToast.min.js"></script>
    <script src="/admin/admin-api.js"></script>
    <script>
      (async function () {
        const authOk = await AdminApi.requireAuth();
        if (!authOk) return;

        document.getElementById("logout").addEventListener("click", function (e) {
          e.preventDefault();
          AdminApi.logout();
        });

        function esc(s) {
          return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/"/g, "&quot;");
        }

        const form = document.getElementById("search-form");
        const formErr = document.getElementById("form-err");
        const resultsCard = document.getElementById("results-card");
        const resultsBody = document.getElementById("results-body");
        const resultsEmpty = document.getElementById("results-empty");
        const resultsTitle = document.getElementById("results-title");
        const resultsCount = document.getElementById("results-count");

        const STATUS_COLOR = { issued: "var(--ok)", used: "var(--muted)", cancelled: "var(--danger)" };

        function renderTickets(tickets, label, reloadFn) {
          resultsCard.hidden = false;
          resultsBody.innerHTML = "";
          resultsTitle.textContent = label;
          resultsCount.textContent = tickets.length + " ticket" + (tickets.length === 1 ? "" : "s");
          if (tickets.length === 0) {
            resultsEmpty.hidden = false;
            return;
          }
          resultsEmpty.hidden = true;
          tickets.forEach(function (t) {
            const sent = t.emailSentAt ? String(t.emailSentAt).slice(0, 16).replace("T", " ") : "—";
            const color = STATUS_COLOR[t.status] || "var(--muted)";
            const tr = document.createElement("tr");
            const actions =
              '<a class="btn secondary" style="font-size:0.8rem;padding:0.3rem 0.6rem" href="/admin/concert.html?id=' +
              encodeURIComponent(t.concertId) + '">Concert</a>' +
              (t.status === "issued"
                ? ' <button type="button" class="btn secondary resend-t" style="font-size:0.8rem;padding:0.3rem 0.6rem">Resend</button>' +
                  ' <button type="button" class="danger cancel-t" style="font-size:0.8rem;padding:0.3rem 0.6rem">Cancel</button>'
                : "");
            tr.innerHTML =
              "<td>" + esc(t.concertName || "—") +
              "</td><td>" + esc(t.customerEmail) +
              '</td><td class="mono" style="font-size:0.8rem">' + esc(t.shopifyOrderId) +
              '</td><td style="text-align:center">' + esc(String(t.ticketIndex)) +
              '</td><td><span style="color:' + color + ';font-weight:500">' + esc(t.status) + "</span>" +
              "</td><td>" + esc(sent) +
              "</td><td>" + actions + "</td>";
            if (t.status === "issued") {
              tr.querySelector(".resend-t").addEventListener("click", async function () {
                try {
                  await AdminApi.api("/api/admin/tickets/resend", {
                    method: "POST",
                    body: JSON.stringify({ ticketId: t.id }),
                  });
                  AdminApi.notify("Email resent", "ok");
                  reloadFn();
                } catch (x) {
                  AdminApi.notify(x.message || "Resend failed", "error");
                }
              });
              tr.querySelector(".cancel-t").addEventListener("click", function () {
                AdminApi.confirm("Cancel this ticket? It will no longer be valid for entry.", async function () {
                  try {
                    await AdminApi.api("/api/admin/tickets/" + encodeURIComponent(t.id) + "/cancel", {
                      method: "POST",
                    });
                    AdminApi.notify("Ticket cancelled", "ok");
                    reloadFn();
                  } catch (x) {
                    AdminApi.notify(x.message || "Cancel failed", "error");
                  }
                });
              });
            }
            resultsBody.appendChild(tr);
          });
        }

        async function loadAll() {
          document.getElementById("q").value = "";
          formErr.hidden = true;
          resultsCard.hidden = false;
          resultsTitle.textContent = "All tickets";
          resultsCount.textContent = "Loading…";
          resultsBody.innerHTML = "";
          resultsEmpty.hidden = true;
          try {
            const data = await AdminApi.api("/api/admin/tickets");
            renderTickets(data.tickets || [], "All tickets", loadAll);
          } catch (x) {
            resultsCard.hidden = true;
            formErr.textContent = x.message || "Load failed";
            formErr.hidden = false;
          }
        }

        async function runSearch() {
          formErr.hidden = true;
          const q = document.getElementById("q").value.trim();
          const mode = document.getElementById("mode").value;
          if (!q) { loadAll(); return; }

          let path = "/api/admin/tickets/search?";
          if (mode === "order") {
            path += "shopifyOrderId=" + encodeURIComponent(q);
          } else {
            path += "email=" + encodeURIComponent(q);
          }

          try {
            const data = await AdminApi.api(path);
            renderTickets(data.tickets || [], "Results for \"" + q + "\"", runSearch);
          } catch (x) {
            formErr.textContent = x.message || "Search failed";
            formErr.hidden = false;
          }
        }

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          runSearch();
        });

        document.getElementById("btn-clear").addEventListener("click", loadAll);

        loadAll();
      })();
    </script>
  </body>
</html>
