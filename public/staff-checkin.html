<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Staff check-in — Alba GB</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" defer></script>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #f8fafc;
      --muted: #94a3b8;
      --ok: #22c55e;
      --warn: #f59e0b;
      --bad: #ef4444;
      --neutral: #64748b;
      --border: #334155;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      line-height: 1.45;
    }
    main { max-width: 28rem; margin: 0 auto; padding: 2.5rem 1rem 3rem; }
    h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 0.5rem; }
    p.sub { color: var(--muted); font-size: 0.875rem; margin: 0 0 1rem; }
    label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 0.35rem; }
    input, select, button, textarea {
      width: 100%;
      padding: 0.75rem 0.85rem;
      border-radius: 0.5rem;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 1rem;
    }
    input:focus, select:focus, button:focus, textarea:focus {
      outline: 2px solid #3b82f6;
      outline-offset: 1px;
    }
    button {
      cursor: pointer;
      font-weight: 600;
      border: none;
      margin-top: 0.75rem;
    }
    button.primary { background: #2563eb; color: #fff; }
    button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
    button.ghost { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
    button.danger { background: transparent; color: var(--muted); font-weight: 500; font-size: 0.875rem; margin-top: 0.5rem; }
    .stack > * + * { margin-top: 0.75rem; }
    .hidden { display: none !important; }
    #reader {
      border-radius: 0.75rem;
      overflow: hidden;
      background: #000;
      min-height: 12rem;
    }
    #reader video { border-radius: 0.75rem; }
    /* ── Scan result overlay ── */
    #scan-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      padding: 2rem;
      text-align: center;
      animation: overlayIn 0.15s ease-out;
    }
    #scan-overlay.show { display: flex; }
    @keyframes overlayIn {
      from { opacity: 0; transform: scale(0.93); }
      to   { opacity: 1; transform: scale(1); }
    }
    #scan-overlay .scan-icon {
      font-size: 5rem;
      line-height: 1;
      animation: iconPop 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes iconPop {
      from { transform: scale(0.4); }
      to   { transform: scale(1); }
    }
    #scan-overlay .scan-label {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      line-height: 1.15;
    }
    #scan-overlay .scan-detail {
      font-size: 1.1rem;
      font-weight: 400;
      opacity: 0.85;
      line-height: 1.5;
    }
    #scan-overlay .scan-dismiss {
      margin-top: 0.5rem;
      font-size: 0.85rem;
      opacity: 0.5;
    }
    #scan-overlay.valid    { background: #14532d; color: #bbf7d0; }
    #scan-overlay.used     { background: #1e293b; color: #cbd5e1; }
    #scan-overlay.warn     { background: #78350f; color: #fde68a; }
    #scan-overlay.bad      { background: #450a0a; color: #fecaca; }
    /* inline error (concert not selected etc) */
    .result.error {
      margin-top: 0.75rem;
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      font-size: 0.95rem;
      font-weight: 600;
      background: rgba(239,68,68,0.15);
      color: #fca5a5;
      text-align: center;
    }
    .row-btns { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .row-btns button { flex: 1; min-width: 8rem; margin-top: 0; }
    textarea { min-height: 5rem; font-family: ui-monospace, monospace; font-size: 0.8rem; resize: vertical; }
    .hint { font-size: 0.8rem; color: var(--muted); margin-top: 0.35rem; }
    header { padding-bottom: 1rem; border-bottom: 1px solid var(--border); margin-bottom: 1rem; }
    .brand { font-weight: 700; font-size: 1rem; color: var(--text); text-decoration: none; letter-spacing: -0.01em; }
    .brand span { color: #60a5fa; font-weight: 400; }
  </style>
</head>
<body>
  <main>
    <header>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.35rem">
        <a href="#" class="brand">AlbaGB &nbsp;<span>Ticketing</span></a>
        <span style="font-size:0.75rem;color:var(--muted)">Staff</span>
      </div>
      <h1>Gate check-in</h1>
      <p class="sub">Sign in, select today’s concert, then scan ticket QR codes. HTTPS required for camera on mobile.</p>
    </header>

    <section id="loginSection" class="stack">
      <div>
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="username" />
      </div>
      <div>
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" />
      </div>
      <button type="button" class="primary" id="btnLogin">Sign in</button>
      <p id="loginError" class="result error hidden" role="alert"></p>
    </section>

    <section id="appSection" class="hidden">
      <div class="stack">
        <div>
          <label for="concert">Concert at this gate</label>
          <select id="concert"></select>
          <p class="hint">Must match the show you are scanning for.</p>
        </div>
        <div class="row-btns">
          <button type="button" class="primary" id="btnCamera">Start camera</button>
          <button type="button" class="ghost" id="btnStop" disabled>Stop</button>
        </div>
        <div id="reader"></div>
        <div>
          <label for="manualQr">Or paste QR JSON</label>
          <textarea id="manualQr" placeholder='{"schemaVersion":1,"ticketId":"…"}'></textarea>
          <button type="button" class="ghost" id="btnManual">Submit pasted QR</button>
        </div>
        <button type="button" class="danger" id="btnLogout">Sign out</button>
      </div>
    </section>
  </main>

  <!-- fullscreen scan result overlay -->
  <div id="scan-overlay" role="status" aria-live="assertive">
    <div class="scan-icon" id="overlay-icon"></div>
    <div class="scan-label" id="overlay-label"></div>
    <div class="scan-detail" id="overlay-detail"></div>
    <div class="scan-dismiss">Tap anywhere to dismiss</div>
  </div>

  <script>
    (function () {
      const TOKEN_KEY = "staffCheckinToken";
      const loginSection = document.getElementById("loginSection");
      const appSection = document.getElementById("appSection");
      const loginError   = document.getElementById("loginError");
      const email        = document.getElementById("email");
      const password     = document.getElementById("password");
      const btnLogin     = document.getElementById("btnLogin");
      const concertSelect= document.getElementById("concert");
      const btnCamera    = document.getElementById("btnCamera");
      const btnStop      = document.getElementById("btnStop");
      const readerEl     = document.getElementById("reader");
      const manualQr     = document.getElementById("manualQr");
      const btnManual    = document.getElementById("btnManual");
      const btnLogout    = document.getElementById("btnLogout");
      const overlay      = document.getElementById("scan-overlay");
      const overlayIcon  = document.getElementById("overlay-icon");
      const overlayLabel = document.getElementById("overlay-label");
      const overlayDetail= document.getElementById("overlay-detail");

      let dismissTimer = null;
      let html5Qr = null;
      let lastPayload = "";
      let lastAt = 0;
      const debounceMs = 2000;

      function baseUrl() {
        return window.location.origin;
      }

      function getToken() {
        return sessionStorage.getItem(TOKEN_KEY);
      }

      function setToken(t) {
        if (t) sessionStorage.setItem(TOKEN_KEY, t);
        else sessionStorage.removeItem(TOKEN_KEY);
      }

      function authHeaders() {
        const t = getToken();
        return {
          "Content-Type": "application/json",
          Authorization: t ? "Bearer " + t : "",
        };
      }

      const SCAN_CONFIG = {
        valid:        { theme: "valid",  icon: "✅", autoDismiss: 4000, vibrate: [80] },
        already_used: { theme: "used",   icon: "🔁", autoDismiss: 3500, vibrate: [60, 80, 60] },
        wrong_event:  { theme: "warn",   icon: "⚠️", autoDismiss: 4000, vibrate: [100, 80, 100] },
        cancelled:    { theme: "bad",    icon: "🚫", autoDismiss: 4000, vibrate: [200] },
        invalid:      { theme: "bad",    icon: "❌", autoDismiss: 4000, vibrate: [200] },
        error:        { theme: "bad",    icon: "⚠️", autoDismiss: 0,    vibrate: [100] },
      };

      function showOverlay(type, label, detail) {
        const cfg = SCAN_CONFIG[type] || { theme: "bad", icon: "❓", autoDismiss: 3000, vibrate: [] };
        overlay.className = "show " + cfg.theme;
        overlayIcon.textContent  = cfg.icon;
        overlayLabel.textContent = label;
        overlayDetail.textContent = detail || "";
        if (navigator.vibrate && cfg.vibrate.length) navigator.vibrate(cfg.vibrate);
        clearTimeout(dismissTimer);
        if (cfg.autoDismiss > 0) {
          dismissTimer = setTimeout(hideOverlay, cfg.autoDismiss);
        }
      }

      function hideOverlay() {
        clearTimeout(dismissTimer);
        overlay.className = "";
      }

      overlay.addEventListener("click", hideOverlay);

      function showResult(type, label) {
        const cfg = SCAN_CONFIG[type] || SCAN_CONFIG.error;
        showOverlay(type, label, "");
      }

      function hideResult() { hideOverlay(); }

      async function apiLogin() {
        loginError.classList.add("hidden");
        btnLogin.disabled = true;
        try {
          const res = await fetch(baseUrl() + "/api/admin/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: email.value.trim(),
              password: password.value,
            }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            throw new Error(data.detail || data.error || "Login failed");
          }
          if (!data.token) throw new Error("No token in response");
          setToken(data.token);
          loginSection.classList.add("hidden");
          appSection.classList.remove("hidden");
          await loadConcerts();
        } catch (e) {
          loginError.textContent = e.message || String(e);
          loginError.classList.remove("hidden");
        } finally {
          btnLogin.disabled = false;
        }
      }

      async function loadConcerts() {
        concertSelect.innerHTML = "";
        const res = await fetch(baseUrl() + "/api/admin/concerts", { headers: authHeaders() });
        if (res.status === 401) {
          setToken(null);
          appSection.classList.add("hidden");
          loginSection.classList.remove("hidden");
          showOverlay("error", "Session expired", "Please sign in again.");
          return;
        }
        const data = await res.json();
        const list = data.concerts || [];
        if (list.length === 0) {
          const opt = document.createElement("option");
          opt.value = "";
          opt.textContent = "No concerts — create one in admin";
          concertSelect.appendChild(opt);
          return;
        }
        list.forEach(function (c) {
          const opt = document.createElement("option");
          opt.value = c.id;
          const d = c.concertDate ? String(c.concertDate).slice(0, 10) : "";
          opt.textContent = (d ? d + " — " : "") + (c.name || "Concert") + " (" + (c.status || "") + ")";
          concertSelect.appendChild(opt);
        });
      }

      async function submitScan(qrText) {
        const concertId = concertSelect.value;
        if (!concertId) {
          showOverlay("error", "Select a concert", "Choose the concert at this gate first.");
          return;
        }
        const now = Date.now();
        if (qrText === lastPayload && now - lastAt < debounceMs) {
          return;
        }
        lastPayload = qrText;
        lastAt = now;

        const res = await fetch(baseUrl() + "/api/admin/check-in/scan", {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify({ concertId: concertId, qr: qrText }),
        });
        const data = await res.json().catch(() => ({}));
        if (res.status === 401) {
          setToken(null);
          appSection.classList.add("hidden");
          loginSection.classList.remove("hidden");
          showOverlay("error", "Session expired", "Please sign in again.");
          return;
        }
        if (!res.ok) {
          showOverlay("error", "Scan failed", data.detail || data.error || "Request failed");
          return;
        }
        const r = data.result || "unknown";
        const labels = {
          valid:        "VALID — Welcome in!",
          already_used: "Already used",
          wrong_event:  "Wrong event",
          cancelled:    "Ticket cancelled",
          invalid:      "Invalid ticket",
        };
        let detail = "";
        if (r === "valid") {
          const parts = [];
          if (data.ticketIndex != null) parts.push("Ticket #" + data.ticketIndex);
          if (data.customerEmail)       parts.push(data.customerEmail);
          detail = parts.join("  ·  ");
        } else if (r === "wrong_event" && data.ticketConcertId) {
          detail = "Ticket is for a different show";
        }
        showOverlay(r, labels[r] || r.toUpperCase(), detail);
      }

      async function startCamera() {
        if (typeof Html5Qrcode === "undefined") {
          showOverlay("error", "QR library failed", "Check network and reload.");
          return;
        }
        hideResult();
        const concertId = concertSelect.value;
        if (!concertId) {
          showOverlay("error", "Select a concert", "Choose the concert at this gate first.");
          return;
        }
        btnCamera.disabled = true;
        try {
          if (!html5Qr) {
            html5Qr = new Html5Qrcode("reader");
          }
          await html5Qr.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 260, height: 260 } },
            function (decodedText) {
              submitScan(decodedText);
            },
            function () {}
          );
          btnStop.disabled = false;
        } catch (e) {
          showOverlay("error", "Camera error", (e && e.message) || "Allow camera permission or use HTTPS.");
          btnCamera.disabled = false;
        }
      }

      async function stopCamera() {
        if (html5Qr) {
          try {
            await html5Qr.stop();
          } catch (e) {
            /* ignore */
          }
        }
        btnStop.disabled = true;
        btnCamera.disabled = false;
      }

      btnLogin.addEventListener("click", apiLogin);
      btnCamera.addEventListener("click", startCamera);
      btnStop.addEventListener("click", function () {
        stopCamera();
      });
      btnManual.addEventListener("click", function () {
        const t = manualQr.value.trim();
        if (!t) {
          showOverlay("error", "No QR data", "Paste QR JSON before submitting.");
          return;
        }
        submitScan(t);
      });
      btnLogout.addEventListener("click", function () {
        stopCamera();
        setToken(null);
        appSection.classList.add("hidden");
        loginSection.classList.remove("hidden");
        hideResult();
        manualQr.value = "";
      });

      if (getToken()) {
        loginSection.classList.add("hidden");
        appSection.classList.remove("hidden");
        loadConcerts();
      }
    })();
  </script>
</body>
</html>
