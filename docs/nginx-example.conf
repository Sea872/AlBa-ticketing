# Snippet for Nginx on Ubuntu — place inside `server { ... }` for tickets.albagb.com
# Adjust `proxy_pass` if the Node app listens on a different port (see PORT in .env).

upstream concert_ticketing {
    server 127.0.0.1:8000;
    keepalive 32;
}

location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_pass http://concert_ticketing;
}

# Shopify webhooks need the raw body; buffer sizes are usually fine at defaults.
# If you terminate TLS at Nginx, ensure Cloudflare or certbot provides HTTPS to clients.
